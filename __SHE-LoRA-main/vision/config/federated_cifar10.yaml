# Quick run: CIFAR10, two clients
# Usage: CONFIG_FILE=federated_cifar10.yaml python -m vision.federated_clip_she
defaults:
  - federated_clip

federated:
  num_rounds: 10
  local_steps: 100
  use_she: true
  he_budgets: [4, 4]
  clients:
    - id: 0
      dataset: CIFAR10
      num_samples: 3000
    - id: 1
      dataset: CIFAR10
      num_samples: 5000
