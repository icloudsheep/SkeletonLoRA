# Quick run: GTSRB, two clients (torchvision >= 0.13, auto-download)
# Usage: CONFIG_FILE=federated_gtsrb.yaml python -m vision.federated_clip_she
defaults:
  - federated_clip

federated:
  num_rounds: 10
  local_steps: 100
  use_she: true
  he_budgets: [4, 4]
  clients:
    - id: 0
      dataset: GTSRB
      num_samples: 20000
    - id: 1
      dataset: GTSRB
      num_samples: 20000
