# =============================================================================
# CKKS Skeleton Decryption — Conda environment specification
# =============================================================================
#
# Usage:
#   conda env create -f environment.yaml
#   conda activate skeleton_lora_fe
#
# Verify:
#   python ckks_skeleton_test.py --demo
# =============================================================================

name: skeleton_lora_fe

channels:
  - defaults
  - conda-forge

dependencies:
  - python=3.10
  - pip
  - pip:
      - tenseal==0.3.16       # CKKS homomorphic encryption (MS SEAL wrapper)
      - safetensors==0.8.0    # Read LoRA adapter weights (framework='np', no torch)
      - numpy                 # Matrix operations, SVD, linear algebra
      - matplotlib             # Plots (Agg backend, headless)
      - tensorboard            # Live experiment metrics and resumable run logs
      - psutil                 # Hardware and environment snapshots
