# =============================================================================
# SecLoRA — Conda environment specification
# =============================================================================
#
# Usage:
#   conda env create -f environment.yaml
#   conda env update -f environment.yaml
#   conda activate lora_fe
#
# Build C extensions (after activation):
#   cd csrc && python setup.py build_ext --inplace   # seclora_core (PBC)
#   python csrc/cuda_build.py                         # seclora_cuda (GPU)
#
# System dependencies (install manually):
#   PBC library: /usr/local/lib/libpbc.so
#     - Ubuntu/Debian: sudo apt install libpbc-dev
#     - Source: https://crypto.stanford.edu/pbc/download.html
#   CUDA Toolkit 12.8+ (must match torch CUDA version)
#
# Verify:
#   python bench_quantum_speedup.py --quick
#   python benchmark_optimization.py
# =============================================================================

name: lora_fe

channels:
  - defaults
  - conda-forge
  - nvidia
  - pytorch

dependencies:
  # -- Runtime --
  - python=3.10
  - pip
  - setuptools
  - wheel

  # -- Build toolchain (C extension + CUDA kernel) --
  - gcc_linux-64
  - gxx_linux-64
  - binutils_linux-64
  - ninja

  # -- PBC pairing cryptography link-time deps (via charm-crypto) --
  - gmp
  - openssl

  # -- CUDA Toolkit (GPU acceleration) --
  - cuda-version=12.9
  - cuda-cudart
  - cuda-cudart-dev
  - cuda-nvcc
  - cuda-nvcc-impl
  - cuda-nvvm-impl
  - cuda-nvvm-tools
  - cuda-cccl_linux-64
  - cuda-crt-dev_linux-64
  - cuda-driver-dev_linux-64
  - libnvptxcompiler-dev

  # -- System libraries --
  - _libgcc_mutex
  - _openmp_mutex
  - bzip2
  - expat
  - libffi
  - libgcc
  - libgcc-ng
  - libgomp
